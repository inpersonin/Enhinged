name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install huggingface_hub
        run: pip install huggingface_hub
        
      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          
          token = os.environ.get('HF_TOKEN')
          if not token:
              raise ValueError('HF_TOKEN secret is not set or empty')
              
          api = HfApi(token=token)
          print('Starting upload to Hugging Face Space...')
          api.upload_folder(
              folder_path='.',
              repo_id='inpersonin/Enhinged',
              repo_type='space',
              ignore_patterns=[
                  'frontend-template/**',
                  '.template_extract/**',
                  'node_modules/**',
                  '.next/**',
                  'out/**',
                  'app/**',
                  'components/**',
                  'hooks/**',
                  'lib/**',
                  'styles/**',
                  'public/**',
                  '*.json',
                  '*.mjs',
                  '*.tsx',
                  '*.ts',
                  'index.html',
                  '.vscode/**',
                  '.git/**',
                  '.github/**'
              ]
          )
          print('Upload completed successfully!')
          "

